<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Hello at Work — multi-company login gateway
    Built by Hello Mental Health.

    Purpose:
      Public entry point for partner-organization staff (Talbert House
      today, more orgs later). The user enters their work email, and
      js/auth.js looks up the email's domain in an approved-domains map
      and forwards them to the right internal portal.

    Design notes:
      - Self-contained styling in css/login.css.
      - Existing site styles (which are inline in every other page) are
        not touched — this page is the public face, not the gated content.
      - All behavior in js/auth.js — no inline JS on this page.
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hello at Work &middot; Sign in</title>
  <meta name="description" content="A Hello Mental Health resource — sign in with your work email to reach your company portal." />

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />

  <!-- Login-only stylesheet. Scoped so it cannot bleed into other pages. -->
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>

  <main class="haw-shell">
    <section class="haw-card" aria-labelledby="haw-heading">

      <header class="haw-header">
        <div class="haw-mark" aria-hidden="true">
          <span class="haw-mark-dot"></span>
        </div>
        <h1 id="haw-heading" class="haw-title">Hello at Work</h1>
        <p class="haw-subtitle">A Hello Mental Health resource</p>
      </header>

      <p class="haw-intro">
        Enter your work email and we&rsquo;ll point you to your organization&rsquo;s wellness portal.
      </p>

      <!-- Inline error region. JS toggles .is-hidden and sets text. -->
      <div id="haw-error" class="haw-error is-hidden" role="alert" aria-live="polite"></div>

      <form id="haw-form" class="haw-form" novalidate>
        <label for="haw-email" class="haw-label">Work email</label>
        <input
          id="haw-email"
          name="email"
          type="email"
          class="haw-input"
          placeholder="you@yourcompany.org"
          autocomplete="email"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          required
          autofocus
        />
        <button type="submit" class="haw-button" id="haw-submit">Continue</button>
      </form>

      <p class="haw-help">
        Trouble signing in? Email
        <a href="mailto:work@hellomentalhealth.com">work@hellomentalhealth.com</a>.
      </p>
    </section>

    <footer class="haw-footer">
      Built with care by Hello Mental Health &middot; Cincinnati, OH
    </footer>
  </main>

  <script src="js/auth.js" defer></script>
</body>
</html>
